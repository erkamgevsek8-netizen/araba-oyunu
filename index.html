<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚗 Araba Simülasyonu - Mobil & PC</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        
        /* HIZ GÖSTERGESİ - SOL ÜST (hem mobil hem PC'de gözükür) */
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 16px;
            border-radius: 15px;
            border: 2px solid #ff6600;
            backdrop-filter: blur(10px);
            z-index: 200;
            min-width: 140px;
        }
        #speed {
            font-size: 52px;
            font-weight: bold;
            color: #ff6600;
            text-shadow: 0 0 20px rgba(255, 102, 0, 0.8);
            line-height: 1;
        }
        .hud-label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .hud-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            font-size: 14px;
        }
        #gear {
            font-size: 36px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }
        #rpm {
            color: #ffff00;
            font-weight: bold;
        }
        #playerState {
            font-weight: bold;
            font-size: 14px;
        }
        
        /* BİNME İSTEMİ - ORTA */
        #enterPrompt {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #00ff00;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 20px;
            border: 2px solid #00ff00;
            z-index: 1000;
            animation: pulse 1.5s infinite;
            text-align: center;
            pointer-events: none;
        }
        @keyframes pulse {
            0%, 100% { border-color: #00ff00; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
            50% { border-color: #00aa00; box-shadow: 0 0 30px rgba(0,255,0,0.6); }
        }
        
        /* ========== MOBİL KONTROLLER ========== */
        #mobileControls {
            display: none; /* Başlangıçta gizli, mobilde gösterilecek */
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 150;
            pointer-events: none;
        }
        
        /* Direksiyon - sol alt */
        #steeringWheel {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 150px;
            height: 150px;
            pointer-events: auto;
        }
        .steer-btn {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        #steerLeft {
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }
        #steerRight {
            top: 50%;
            right: 0;
            transform: translateY(-50%);
        }
        #steerLeft:active, #steerRight:active {
            background: rgba(255,102,0,0.6);
            border-color: #ff6600;
        }
        
        /* Gaz/Fren - sağ alt */
        #pedals {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
        }
        .pedal-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
        }
        #gasPedal {
            background: rgba(0,255,0,0.3);
            font-size: 24px;
        }
        #brakePedal {
            background: rgba(255,0,0,0.3);
            font-size: 24px;
        }
        #gasPedal:active {
            background: rgba(0,255,0,0.8);
            box-shadow: 0 0 30px rgba(0,255,0,0.6);
        }
        #brakePedal:active {
            background: rgba(255,0,0,0.8);
            box-shadow: 0 0 30px rgba(255,0,0,0.6);
        }
        
        /* Vites butonları - orta alt */
        #gearBox {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        .gear-btn {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #00ffcc;
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gear-btn:active {
            background: rgba(0,255,204,0.3);
            box-shadow: 0 0 20px rgba(0,255,204,0.5);
        }
        
        /* El freni butonu - üst orta */
        #handbrakeBtn {
            position: absolute;
            bottom: 50%;
            right: 15px;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: rgba(255,0,0,0.3);
            border: 2px solid #ff0000;
            color: white;
            font-size: 12px;
            font-weight: bold;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #handbrakeBtn.active {
            background: rgba(255,0,0,0.8);
            box-shadow: 0 0 20px rgba(255,0,0,0.7);
        }
        
        /* Bin/İn butonu - mobil */
        #enterBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(0,128,255,0.4);
            border: 2px solid #0088ff;
            color: white;
            font-size: 14px;
            font-weight: bold;
            pointer-events: auto;
            display: none;
        }
        
        /* Mobil uyarı */
        #mobileNotice {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #ff6600;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            z-index: 300;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- HIZ GÖSTERGESİ - Her zaman görünür -->
    <div id="hud">
        <div class="hud-label">HIZ (km/h)</div>
        <div id="speed">0</div>
        <div class="hud-row">
            <span style="color: #aaa;">Devir:</span>
            <span id="rpm">0</span>
        </div>
        <div class="hud-row">
            <span style="color: #aaa;">Vites:</span>
            <span id="gear">1</span>
        </div>
        <div class="hud-row">
            <span id="playerState" style="color: #ff6600;">🚗 ARABADA</span>
        </div>
    </div>

    <!-- BİNME İSTEMİ -->
    <div id="enterPrompt">
        Arabaya binmek için <strong>F</strong> tuşuna bas!
    </div>
    
    <!-- Mobil uyarı -->
    <div id="mobileNotice">
        📱 Mobil mod aktif<br>
        <small>Dokunmatik kontrolleri kullan</small>
    </div>

    <!-- ========== MOBİL DOKUNMATİK KONTROLLER ========== -->
    <div id="mobileControls">
        <!-- Direksiyon -->
        <div id="steeringWheel">
            <div class="steer-btn" id="steerLeft">◀</div>
            <div class="steer-btn" id="steerRight">▶</div>
        </div>
        
        <!-- Gaz / Fren -->
        <div id="pedals">
            <div class="pedal-btn" id="gasPedal">🟢</div>
            <div class="pedal-btn" id="brakePedal">🔴</div>
        </div>
        
        <!-- Vites -->
        <div id="gearBox">
            <div class="gear-btn" id="gearDown">▼</div>
            <div class="gear-btn" id="gearUp">▲</div>
        </div>
        
        <!-- El Freni -->
        <div id="handbrakeBtn">EL<br>FREN</div>
        
        <!-- Bin/İn -->
        <div id="enterBtn">BİN/<br>İN</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CİHAZ TESPİTİ ---
        const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || 
                         ('ontouchstart' in window && window.innerWidth < 1024);
        
        console.log('Cihaz:', isMobile ? 'MOBİL' : 'BİLGİSAYAR');
        
        // Mobil kontrolleri göster/gizle
        if (isMobile) {
            document.getElementById('mobileControls').style.display = 'block';
            document.getElementById('enterBtn').style.display = 'flex';
            document.getElementById('mobileNotice').style.display = 'block';
            setTimeout(() => {
                document.getElementById('mobileNotice').style.display = 'none';
            }, 3000);
        }

        // --- SAHNE KURULUMU ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 500);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 15, -20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- IŞIKLANDIRMA ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(100, 150, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);

        // --- ZEMİN ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(500, 500),
            new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Yol
        const roadGroup = new THREE.Group();
        for (let i = -200; i < 200; i += 8) {
            const line = new THREE.Mesh(
                new THREE.PlaneGeometry(0.5, 3),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            line.rotation.x = -Math.PI / 2;
            line.position.set(0, 0.01, i);
            roadGroup.add(line);
        }
        const roadSurface = new THREE.Mesh(
            new THREE.PlaneGeometry(8, 500),
            new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 })
        );
        roadSurface.rotation.x = -Math.PI / 2;
        roadSurface.position.y = 0.005;
        roadSurface.receiveShadow = true;
        roadGroup.add(roadSurface);
        scene.add(roadGroup);

        // Binalar
        for (let i = 0; i < 60; i++) {
            const angle = Math.random() * Math.PI * 2;
            const distance = 30 + Math.random() * 150;
            const w = 4 + Math.random() * 10;
            const h = 8 + Math.random() * 40;
            const d = 4 + Math.random() * 10;
            const building = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshStandardMaterial({ color: Math.random() * 0x888888 + 0x444444 })
            );
            building.position.set(Math.cos(angle) * distance, h/2, Math.sin(angle) * distance);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);
        }

        // Ağaçlar
        for (let i = 0; i < 80; i++) {
            const angle = Math.random() * Math.PI * 2;
            const distance = 20 + Math.random() * 100;
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.5, 4),
                new THREE.MeshStandardMaterial({ color: 0x8B4513 })
            );
            trunk.position.y = 2;
            trunk.castShadow = true;
            tree.add(trunk);
            const foliage = new THREE.Mesh(
                new THREE.ConeGeometry(2, 5),
                new THREE.MeshStandardMaterial({ color: 0x228B22 })
            );
            foliage.position.y = 5.5;
            foliage.castShadow = true;
            tree.add(foliage);
            tree.position.set(Math.cos(angle) * distance, 0, Math.sin(angle) * distance);
            scene.add(tree);
        }

        // --- ARABA ---
        const car = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(2.2, 0.8, 4.5),
            new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.3, metalness: 0.7 })
        );
        body.position.y = 0.7;
        body.castShadow = true;
        car.add(body);

        const cabin = new THREE.Mesh(
            new THREE.BoxGeometry(1.8, 0.5, 2.2),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.9 })
        );
        cabin.position.set(0, 1.2, -0.3);
        cabin.castShadow = true;
        car.add(cabin);

        const headlightMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffff00, emissiveIntensity: 0.5 });
        [-0.7, 0.7].forEach(x => {
            const light = new THREE.Mesh(new THREE.SphereGeometry(0.2), headlightMat);
            light.position.set(x, 0.6, -2.2);
            car.add(light);
        });

        const wheels = [];
        [[-1.2, 1.5], [1.2, 1.5], [-1.2, -1.5], [1.2, -1.5]].forEach(([x, z]) => {
            const wheel = new THREE.Mesh(
                new THREE.CylinderGeometry(0.4, 0.4, 0.3, 32),
                new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })
            );
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(x, 0.4, z);
            wheel.castShadow = true;
            car.add(wheel);
            wheels.push(wheel);
        });

        car.position.set(5, 0.4, 5);
        scene.add(car);

        // --- OYUNCU KARAKTERİ ---
        const playerCharacter = new THREE.Group();
        const playerBody = new THREE.Mesh(
            new THREE.CylinderGeometry(0.3, 0.3, 1.8, 8),
            new THREE.MeshStandardMaterial({ color: 0x3366ff })
        );
        playerBody.position.y = 0.9;
        playerCharacter.add(playerBody);
        const playerHead = new THREE.Mesh(
            new THREE.SphereGeometry(0.25),
            new THREE.MeshStandardMaterial({ color: 0xffcc99 })
        );
        playerHead.position.y = 2.0;
        playerCharacter.add(playerHead);
        playerCharacter.visible = false;
        playerCharacter.position.set(7, 0, 5);
        scene.add(playerCharacter);

        // --- OYUN DURUMU ---
        let inCar = true;
        const carState = { speed: 0, steering: 0, gear: 1, rpm: 0, handbrake: false };
        const keys = {};
        const mobileInput = { left: false, right: false, gas: false, brake: false };
        const gearMaxSpeed = [15, 50, 90, 140, 200, 260];
        const gearRatios = [3.5, 2.5, 1.8, 1.3, 1.0];

        // --- KLAVYE DİNLEYİCİLERİ (PC) ---
        window.addEventListener('keydown', (e) => {
            if (isMobile) return;
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') e.preventDefault();
            if (e.key.toLowerCase() === 'f') toggleCarEntry();
            if (e.key.toLowerCase() === 'r') resetCar();
            if (e.key.toLowerCase() === 'e' && inCar) changeGear(1);
            if (e.key.toLowerCase() === 'q' && inCar) changeGear(-1);
        });

        window.addEventListener('keyup', (e) => {
            if (isMobile) return;
            keys[e.key.toLowerCase()] = false;
        });

        // --- MOBİL DOKUNMATİK KONTROLLER ---
        if (isMobile) {
            // Direksiyon
            const steerLeft = document.getElementById('steerLeft');
            const steerRight = document.getElementById('steerRight');
            
            steerLeft.addEventListener('touchstart', (e) => { e.preventDefault(); mobileInput.left = true; });
            steerLeft.addEventListener('touchend', () => { mobileInput.left = false; });
            steerLeft.addEventListener('touchcancel', () => { mobileInput.left = false; });
            
            steerRight.addEventListener('touchstart', (e) => { e.preventDefault(); mobileInput.right = true; });
            steerRight.addEventListener('touchend', () => { mobileInput.right = false; });
            steerRight.addEventListener('touchcancel', () => { mobileInput.right = false; });

            // Gaz/Fren
            const gasPedal = document.getElementById('gasPedal');
            const brakePedal = document.getElementById('brakePedal');
            
            gasPedal.addEventListener('touchstart', (e) => { e.preventDefault(); mobileInput.gas = true; });
            gasPedal.addEventListener('touchend', () => { mobileInput.gas = false; });
            gasPedal.addEventListener('touchcancel', () => { mobileInput.gas = false; });
            
            brakePedal.addEventListener('touchstart', (e) => { e.preventDefault(); mobileInput.brake = true; });
            brakePedal.addEventListener('touchend', () => { mobileInput.brake = false; });
            brakePedal.addEventListener('touchcancel', () => { mobileInput.brake = false; });

            // Vites
            document.getElementById('gearUp').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (inCar) changeGear(1);
            });
            document.getElementById('gearDown').addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (inCar) changeGear(-1);
            });

            // El Freni
            const handbrakeBtn = document.getElementById('handbrakeBtn');
            handbrakeBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                carState.handbrake = !carState.handbrake;
                handbrakeBtn.classList.toggle('active', carState.handbrake);
            });

            // Bin/İn
            document.getElementById('enterBtn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                toggleCarEntry();
            });

            // Mouse ile de çalışsın (PC'de test için)
            steerLeft.addEventListener('mousedown', () => { mobileInput.left = true; });
            steerLeft.addEventListener('mouseup', () => { mobileInput.left = false; });
            steerLeft.addEventListener('mouseleave', () => { mobileInput.left = false; });
            
            steerRight.addEventListener('mousedown', () => { mobileInput.right = true; });
            steerRight.addEventListener('mouseup', () => { mobileInput.right = false; });
            steerRight.addEventListener('mouseleave', () => { mobileInput.right = false; });
            
            gasPedal.addEventListener('mousedown', () => { mobileInput.gas = true; });
            gasPedal.addEventListener('mouseup', () => { mobileInput.gas = false; });
            gasPedal.addEventListener('mouseleave', () => { mobileInput.gas = false; });
            
            brakePedal.addEventListener('mousedown', () => { mobileInput.brake = true; });
            brakePedal.addEventListener('mouseup', () => { mobileInput.brake = false; });
            brakePedal.addEventListener('mouseleave', () => { mobileInput.brake = false; });
            
            document.getElementById('gearUp').addEventListener('mousedown', () => { if (inCar) changeGear(1); });
            document.getElementById('gearDown').addEventListener('mousedown', () => { if (inCar) changeGear(-1); });
            
            handbrakeBtn.addEventListener('mousedown', () => {
                carState.handbrake = !carState.handbrake;
                handbrakeBtn.classList.toggle('active', carState.handbrake);
            });
            
            document.getElementById('enterBtn').addEventListener('mousedown', () => { toggleCarEntry(); });
        }

        function toggleCarEntry() {
            if (inCar) {
                inCar = false;
                carState.speed = 0;
                carState.steering = 0;
                const exitX = car.position.x + Math.sin(car.rotation.y + Math.PI/2) * 3;
                const exitZ = car.position.z + Math.cos(car.rotation.y + Math.PI/2) * 3;
                playerCharacter.position.set(exitX, 0, exitZ);
                playerCharacter.visible = true;
                document.getElementById('playerState').textContent = '🚶 YAYADA';
                document.getElementById('playerState').style.color = '#00ff00';
                document.getElementById('enterPrompt').style.display = 'none';
                if (isMobile) document.getElementById('enterBtn').style.display = 'flex';
            } else {
                const distToCar = playerCharacter.position.distanceTo(car.position);
                if (distToCar < 5) {
                    inCar = true;
                    playerCharacter.visible = false;
                    carState.speed = 0;
                    document.getElementById('playerState').textContent = '🚗 ARABADA';
                    document.getElementById('playerState').style.color = '#ff6600';
                    document.getElementById('enterPrompt').style.display = 'none';
                    if (isMobile) document.getElementById('enterBtn').style.display = 'flex';
                }
            }
        }

        function resetCar() {
            carState.speed = 0;
            carState.steering = 0;
            carState.gear = 1;
            car.position.set(5, 0.4, 5);
            car.rotation.y = 0;
            if (!inCar) playerCharacter.position.set(7, 0, 5);
            updateUI();
        }

        function changeGear(delta) {
            carState.gear = Math.max(-1, Math.min(5, carState.gear + delta));
        }

        function updateUI() {
            const speedKmh = Math.abs(carState.speed * 3.6);
            document.getElementById('speed').textContent = Math.round(speedKmh);
            document.getElementById('rpm').textContent = Math.round(carState.rpm);
            const gearDisplay = document.getElementById('gear');
            if (carState.gear === 0) gearDisplay.textContent = 'N';
            else if (carState.gear === -1) gearDisplay.textContent = 'R';
            else gearDisplay.textContent = carState.gear;
        }

        let lastTime = performance.now();

        function update(deltaTime) {
            const dt = Math.min(deltaTime, 0.1);
            
            // Giriş kontrolü
            let throttle, brake, steerLeft, steerRight;
            
            if (isMobile) {
                throttle = mobileInput.gas ? 1 : 0;
                brake = mobileInput.brake ? 1 : 0;
                steerLeft = mobileInput.left;
                steerRight = mobileInput.right;
            } else {
                throttle = (keys['w'] || keys['arrowup']) ? 1 : 0;
                brake = (keys['s'] || keys['arrowdown']) ? 1 : 0;
                steerLeft = keys['a'] || keys['arrowleft'];
                steerRight = keys['d'] || keys['arrowright'];
                carState.handbrake = keys[' '] || keys['space'];
            }
            
            if (inCar) {
                // Direksiyon
                if (steerLeft) carState.steering += 2 * dt;
                else if (steerRight) carState.steering -= 2 * dt;
                else carState.steering *= Math.exp(-5 * dt);
                carState.steering = Math.max(-0.6, Math.min(0.6, carState.steering));
                
                const gearIndex = Math.max(0, Math.min(4, carState.gear - 1));
                const maxSpeed = gearMaxSpeed[Math.max(0, carState.gear)] / 3.6;
                const ratio = carState.gear > 0 ? gearRatios[gearIndex] : -3.5;
                
                let force = throttle * ratio * 8 - brake * 15 - carState.speed * 0.5;
                if (carState.handbrake) force -= 25;
                if (Math.abs(carState.speed) > maxSpeed && force * carState.speed > 0) force = 0;
                
                carState.speed += force * dt;
                carState.rpm = Math.abs(carState.speed) * Math.abs(ratio) * 800;
                
                car.rotation.y += carState.steering * carState.speed * dt * 0.5;
                car.position.x += Math.sin(car.rotation.y) * carState.speed * dt;
                car.position.z += Math.cos(car.rotation.y) * carState.speed * dt;
                
                wheels.forEach(w => w.rotation.x += carState.speed * dt * 5);
                
                const camOffset = new THREE.Vector3(
                    Math.sin(car.rotation.y) * -12, 6,
                    Math.cos(car.rotation.y) * -12
                );
                camera.position.lerp(
                    new THREE.Vector3(car.position.x + camOffset.x, car.position.y + camOffset.y, car.position.z + camOffset.z),
                    5 * dt
                );
                camera.lookAt(car.position.x, car.position.y + 1, car.position.z);
            } else {
                const walkSpeed = 8;
                const moveX = (steerRight ? 1 : 0) - (steerLeft ? 1 : 0);
                const moveZ = (brake ? 1 : 0) - (throttle ? 1 : 0);
                
                playerCharacter.position.x += moveX * walkSpeed * dt;
                playerCharacter.position.z += moveZ * walkSpeed * dt;
                
                camera.position.lerp(
                    new THREE.Vector3(playerCharacter.position.x + 5, 8, playerCharacter.position.z + 8),
                    5 * dt
                );
                camera.lookAt(playerCharacter.position.x, 1, playerCharacter.position.z);
                
                const distToCar = playerCharacter.position.distanceTo(car.position);
                document.getElementById('enterPrompt').style.display = distToCar < 5 ? 'block' : 'none';
            }
            
            updateUI();
        }

        function animate() {
            requestAnimationFrame(animate);
            const currentTime = performance.now();
            update((currentTime - lastTime) / 1000);
            lastTime = currentTime;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        carState.gear = 1;
        updateUI();
        animate();
        
        console.log('✅ Oyun hazır!', isMobile ? 'Mobil mod' : 'PC mod');
    </script>
</body>
</html>
